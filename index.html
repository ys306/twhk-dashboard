<script>
// Storage: localStorage primary, Firebase sync secondary
const LS_KEY="twhk_v5", LS_HIST="twhk_v5_hist", LS_SNAP="twhk_v5_snap";

// localStorage loaded after S declaration below

let _saving=false;
function syncUI(s){
  const dot=document.getElementById("sync-dot"),txt=document.getElementById("sync-txt");
  if(!dot)return;
  dot.className=s==="ok"?"":s==="syncing"?"syncing":"error";
  txt.textContent=s==="ok"?"저장됨":s==="syncing"?"저장 중...":"오류";
}
async function save(desc,diff){
  _saving=true;syncUI("syncing");
  try{
    localStorage.setItem(LS_KEY,JSON.stringify(S));
    if(desc){
      const h=window._histData||{};
      h["h"+Date.now()]={who:window._currentUser||"?",what:desc,when:new Date().toISOString(),diff:diff||null};
      const keys=Object.keys(h).sort();if(keys.length>200)keys.slice(0,-200).forEach(k=>delete h[k]);
      localStorage.setItem(LS_HIST,JSON.stringify(h));
      window._histData=h;
    }
    syncUI("ok");
  }catch(e){syncUI("error");}
  _saving=false;
}

// Firebase sync in background (optional - UI works without it)
function _initFirebase(){
  try{
    if(typeof firebase==="undefined")return;
    firebase.initializeApp({apiKey:"AIzaSyBqbvek3T8PbKakOd-9dsrwyK1kQ6ifXaU",authDomain:"twhk-dashboard-4e2ae.firebaseapp.com",databaseURL:"https://twhk-dashboard-4e2ae-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"twhk-dashboard-4e2ae",storageBucket:"twhk-dashboard-4e2ae.firebasestorage.app",messagingSenderId:"454545580861",appId:"1:454545580861:web:06507d9ea95e2afa4cdb54"});
    const db=firebase.database();
    db.ref("v5").on("value",snap=>{
      if(_saving)return;
      const d=snap.val();
      if(d){
        // merge: Firebase wins, but save to localStorage too
        S=d;localStorage.setItem(LS_KEY,JSON.stringify(S));
        syncUI("ok");renderHeader();rerenderCurrent();
      } else {
        // push local data to Firebase
        db.ref("v5").set(S);
      }
    });
    // Override save to also write to Firebase
    const _localSave=save;
    window._fbdb=db;
  }catch(e){console.log("Firebase optional - using localStorage only");}
}
// Try Firebase after page renders
setTimeout(_initFirebase,500);

function autoSnapshotIfNeeded(){
  try{
    const today=new Date().toISOString().slice(0,10);
    if(localStorage.getItem("lastSnap")===today)return;
    if(new Date().getDay()===1||!localStorage.getItem("lastSnap")){
      const snaps=JSON.parse(localStorage.getItem(LS_SNAP)||"{}");
      snaps[today]={data:JSON.parse(JSON.stringify(S)),at:new Date().toISOString(),label:"자동 백업"};
      const keys=Object.keys(snaps).sort();if(keys.length>30)keys.slice(0,-30).forEach(k=>delete snaps[k]);
      localStorage.setItem(LS_SNAP,JSON.stringify(snaps));
      localStorage.setItem("lastSnap",today);
    }
  }catch(e){}
}
async function takeSnapshot(label){
  try{
    const key=new Date().toISOString().slice(0,16).replace("T","_").replace(":","");
    const snaps=JSON.parse(localStorage.getItem(LS_SNAP)||"{}");
    snaps[key]={data:JSON.parse(JSON.stringify(S)),at:new Date().toISOString(),label:label||"수동 백업",by:window._currentUser||"?"};
    localStorage.setItem(LS_SNAP,JSON.stringify(snaps));
    return key;
  }catch(e){return null;}
}
window._snapData=(function(){try{return JSON.parse(localStorage.getItem(LS_SNAP)||"{}");}catch(e){return {};}})();
const ADMIN_PW="yeseul2025";
const PRODS_DEF=["율무팩","제로팩","MTS","보라당근앰플"];

// ── DEFAULT SCHEMAS ──────────────────────────────────────
// fieldType: text|memo|dropdown|checkbox|date|link|number
const DEFAULT_SCHEMAS={
  influencer:[
    {id:"f_month",label:"진행 월",type:"month_picker",required:true},
    {id:"f_upload_date",label:"업로드 목표 일정",type:"date"},
    {id:"f_product",label:"제품",type:"product_picker",required:true},
    {id:"f_owner",label:"담당자",type:"inf_member_picker"},
    {id:"f_name",label:"계정명",type:"text",required:true},
    {id:"f_account_url",label:"계정 링크",type:"link"},
    {id:"f_region",label:"지역",type:"region_picker",required:true},
    {id:"f_status",label:"진행 현황",type:"dropdown",options:["리스트업","컨택 완료","계약 완료","가이드 기획","가이드 컨펌 완료","초안 수령","업로드 완료"]},

window._renderHistory=function(){
  const el=document.getElementById("history-list");
  const data=window._histData||{};
  const cutoff=new Date(Date.now()-30*24*60*60*1000);
  const items=Object.entries(data).map(([k,v])=>({...v,_key:k})).filter(i=>new Date(i.when)>=cutoff).sort((a,b)=>new Date(b.when)-new Date(a.when));
  if(!items.length){el.innerHTML=`<div class="text-muted" style="text-align:center;padding:20px">최근 30일 기록이 없습니다</div>`;return;}
  el.innerHTML=`<div class="text-muted mb-8" style="padding:0 2px">최근 30일 · ${items.length}건</div>`+items.map(i=>{
    const d=new Date(i.when);
    const ws=`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
    let dh="";
    if(i.diff){const rows=Object.entries(i.diff).map(([f,{before,after}])=>`<div>${esc(f)}: <span class="diff-before">${esc(String(before??"-"))}</span> → <span class="diff-after">${esc(String(after??"-"))}</span></div>`).join("");dh=`<div class="hist-diff" id="diff-${i._key}">${rows}</div>`;}
    return `<div class="hist-item" onclick="toggleDiff('${i._key}')"><div><span class="hist-who">${esc(i.who)}</span><span class="hist-when">${ws}</span></div><div class="hist-what">${esc(i.what)}</div>${dh}</div>`;
  }).join("");
};

function buildFormHtml(schema,record){
  record=record||{};
  return schema.map(f=>{
    const val=record[f.id]??f.default??"";
    const fid="ff_"+f.id;
    let inp="";
    switch(f.type){
      case"text":inp=`<input id="${fid}" value="${esc(val)}">`;break;
      case"memo":inp=`<textarea id="${fid}" rows="2">${esc(val)}</textarea>`;break;
      case"number":inp=`<input id="${fid}" type="number" step="any" value="${esc(val)}">`;break;
      case"date":inp=`<input id="${fid}" type="date" value="${esc(val)}">`;break;
      case"checkbox":return `<div class="modal-check-row"><input type="checkbox" id="${fid}"${val?" checked":""}><label for="${fid}">${esc(f.label)}</label></div>`;
      case"link":inp=`<input id="${fid}" placeholder="https://" value="${esc(val)}">`;break;
      case"dropdown":{const opts=arr(f.options||[]);inp=`<select id="${fid}">${opts.map(o=>`<option${String(val)===String(o)?" selected":""}>${esc(o)}</option>`).join("")}</select>`;break;}
      case"region_picker":inp=`<select id="${fid}"><option value="">선택</option>${["TW","HK"].map(o=>`<option${val===o?" selected":""}>${o}</option>`).join("")}</select>`;break;
      case"product_picker":inp=`<select id="${fid}"><option value="">선택</option>${prods().map(o=>`<option${val===o?" selected":""}>${esc(o)}</option>`).join("")}</select>`;break;
      case"month_picker":inp=`<select id="${fid}"><option value="">선택</option>${monthOpts(val,false)}</select>`;break;

// Read form values back into a record object
function readFormValues(schema,existingRecord){
  const rec={...(existingRecord||{})};
  schema.forEach(f=>{
    const fid="ff_"+f.id;
    if(f.type==="week_picker"){rec[f.id]=getWeekVal();return;}
    if(f.type==="checkbox"){rec[f.id]=gb(fid);return;}
    if(["number"].includes(f.type)){rec[f.id]=gn(fid);return;}
    rec[f.id]=gv(fid);
  });
  return rec;
}

// Render a cell value from a field definition
function renderCell(f,val){
  if(val===undefined||val===null||val==="")return `<span class="text-muted">-</span>`;
  switch(f.type){
    case"checkbox":return val?`<span style="color:#22c55e;font-size:15px">✅</span>`:``;
    case"link":{
      if(!val)return`<span class="text-muted">-</span>`;
      const href=val.startsWith("http")?val:"https://"+val;
      return`<a href="${esc(href)}" target="_blank" rel="noopener" style="color:#6366f1;font-size:12px">🔗 링크</a>`;
    }
    case"dropdown":return stag(String(val));
    case"region_picker":return val?`<span class="chip">${esc(val)}</span>`:``;
    case"product_picker":return val?`<span class="chip">${esc(val)}</span>`:``;
    case"month_picker":return`<span class="text-muted">${esc(val)}</span>`;
    case"week_picker":return`<span class="text-muted">${weekLabel(val)}</span>`;
    case"number":return val?String(Number(val).toLocaleString()):``;
    case"memo":
    case"text":{
      const str=String(val);
      const id="cell_"+Math.random().toString(36).slice(2,8);
      const isLong=str.length>30;
      if(!isLong)return`<span style="font-size:12px;color:#1e2535">${esc(str)}</span>`;
      return`<span id="${id}" class="expandable-cell" onclick="toggleCell('${id}')" style="max-width:160px;display:inline-block;font-size:12px;color:#1e2535;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;border-bottom:1px dashed #c7d2fe" title="클릭하면 펼쳐집니다">${esc(str)}</span>`;
    }
    default:return `<span style="font-size:13px">${esc(val)}</span>`;
  }
}

function strategyMatchMonth(st,month){if(month==="all")return true;if(!st.startMonth&&!st.endMonth)return true;const s=st.startMonth||"0000-00",e=st.endMonth||"9999-99";return month>=s&&month<=e;}
function actionMatchMonth(a,month){
  if(month==="all")return true;
  const am=a.f_month||a.month||"";const dm=a.f_due_date?a.f_due_date.substring(0,7):"";
  if(am&&dm)return am<=month&&dm>=month;
  if(am)return am<=month;if(dm)return dm>=month;return true;
}
function renderStrCard(prod,label,allMonthData){
  const schema=getSchema("strategy_action");
  const mKeys=Object.keys(allMonthData);
  const matchingStrats=mKeys.filter(mk=>{const st=allMonthData[mk];const rOk=strFilter==="ALL"||!st.region||st.region==="전체"||st.region===strFilter;return rOk&&strategyMatchMonth(st,strMonth);});
  let allActions=[];

    arr(allMonthData[mk].actions).forEach(a=>{
      const rOk=strFilter==="ALL"||!a.f_region||a.f_region==="전체"||a.f_region===strFilter;
      if(rOk&&actionMatchMonth(a,strMonth))allActions.push({...a,_mk:mk});
    });
  });
  const seen=new Set();allActions=allActions.filter(a=>{if(seen.has(a.id))return false;seen.add(a.id);return true;});
  const done=allActions.filter(a=>a.f_status==="진행 완료").length;const total=allActions.length;const pp=pct(done,total);
  let stratSums=matchingStrats.map(mk=>{
    const st=allMonthData[mk];if(!st.summary)return"";
    const rl=st.region&&st.region!=="전체"?` <span class="chip">${esc(st.region)}</span>`:"";
    const period=st.startMonth&&st.endMonth&&st.startMonth!==st.endMonth?`${st.startMonth} ~ ${st.endMonth}`:(st.startMonth||st.endMonth||mk.split("_")[0]);
    return `<div style="background:#f5f7ff;border-radius:8px;padding:10px 14px;font-size:12px;color:#64748b;line-height:1.7;margin-bottom:8px;position:relative">

        </div>

  // table headers from schema
  const thHtml=schema.map(f=>`<th>${esc(f.label)}</th>`).join("")+"<th></th>";
  let rows=allActions.map(a=>`<tr>${schema.map(f=>`<td>${renderCell(f,a[f.id])}</td>`).join("")}<td><button class="btn btn-ghost btn-sm" onclick="editAction('${esc(prod)}','${a._mk}',${a.id})">수정</button></td></tr>`).join("");
  return `<div class="card mb-16">
    <div class="row gap-10 mb-10" style="justify-content:space-between;flex-wrap:wrap">
      <div class="row gap-8"><span style="font-size:15px;font-weight:900">${esc(label)}</span><span class="text-muted">${done}/${total} 완료</span>${total?`<div class="bar-wrap" style="width:60px;height:5px"><div class="bar-fill" style="width:${pp}%;background:${cpct(pp)}"></div></div>`:""}</div>
      <div style="display:flex;gap:7px">

  </div>`;
}

// Used for influencer, content, promo, onsite, reference
let tabFilters={influencer:{reg:"ALL",month:"all",prod:"ALL",week:"all"},content:{reg:"ALL",month:"all",prod:"ALL",week:"all"},promo:{reg:"ALL"},onsite:{reg:"ALL"},reference:{reg:"ALL"}};

function getRecords(tabKey){return arr((S.records||{})[tabKey]||[]);}
function setRecords(tabKey,arr2){if(!S.records)S.records={};S.records[tabKey]=arr2;}

function renderGenericTab(tabKey,title,filterConfig,boardFn){
  const p=document.getElementById("panel-"+tabKey);
  const schema=getSchema(tabKey);
  const f=tabFilters[tabKey]||{reg:"ALL"};
  const allRecs=getRecords(tabKey);
  // filter
  const filtered=allRecs.filter(r=>{
    const gr=window._globalRegion||"ALL";
    if(gr!=="ALL"&&r.f_region&&r.f_region!==gr)return false;
    if(f.reg&&f.reg!=="ALL"&&r.f_region!==f.reg)return false;
    if(f.month&&f.month!=="all"&&r.f_month&&r.f_month!==f.month)return false;
    if(f.prod&&f.prod!=="ALL"&&r.f_product!==f.prod)return false;
    if(f.week&&f.week!=="all"&&r.f_week!==f.week)return false;
    // hidden products filter
    if(r.f_product&&hiddenProds().includes(r.f_product))return false;
    return true;
  });

  // filter bar
  const _gr=window._globalRegion||"ALL";
  let filterHtml=_gr!=="ALL"?"":`<div class="filter-bar">
    <button class="filter-pill${f.reg==="ALL"?" active":""}" onclick="setTabFilter('${tabKey}','reg','ALL')">전체 국가</button>
    <button class="filter-pill${f.reg==="TW"?" active":""}" onclick="setTabFilter('${tabKey}','reg','TW')">🇹🇼 대만</button>
    <button class="filter-pill${f.reg==="HK"?" active":""}" onclick="setTabFilter('${tabKey}','reg','HK')">🇭🇰 홍콩</button>
  </div>`;
  if(filterConfig.month){filterHtml+=`<div class="filter-bar"><span class="text-muted">월</span><select class="sel" onchange="setTabFilter('${tabKey}','month',this.value)"><option value="all"${f.month==="all"?" selected":""}>전체</option>${monthOpts(f.month,false)}</select></div>`;}
  if(filterConfig.week){
    const allWeeks=["all",...new Set(allRecs.map(x=>x.f_week).filter(Boolean)).values()].sort();
    filterHtml+=`<div class="filter-bar"><span class="text-muted">주차</span><select class="sel" onchange="setTabFilter('${tabKey}','week',this.value)">${allWeeks.map(wk=>`<option value="${esc(wk)}"${f.week===wk?" selected":""}>${wk==="all"?"전체":weekLabel(wk)}</option>`).join("")}</select></div>`;
  }
  if(filterConfig.prod){
    const pills=["ALL",...prods()].map(pr=>`<button class="filter-pill${(f.prod||"ALL")===pr?" active":""}" onclick="setTabFilter('${tabKey}','prod','${esc(pr)}')">${pr==="ALL"?"전체 제품":esc(pr)}</button>`).join("");
    filterHtml+=`<div class="filter-bar">${pills}</div>`;
  }

  // board
  const boardHtml=boardFn?boardFn(filtered,allRecs):"";

  // table
  const adminEdit=window._isAdmin?`<button class="btn btn-ghost btn-sm" onclick="openSchemaEditor('${tabKey}')"><span class="admin-badge">관리자</span> 필드 관리</button>`:"";
  const addBtn=canEdit()?`<button class="btn btn-primary" onclick="addRecord('${tabKey}')">+ 추가</button>`:"";
  const thHtml=schema.map(f=>`<th>${esc(f.label)}</th>`).join("")+"<th></th>";
  let rows=filtered.map(rec=>`<tr>${schema.map(f=>`<td>${renderCell(f,rec[f.id])}</td>`).join("")}<td>${canEdit()?`<button class="btn btn-ghost btn-sm" onclick="editRecord('${tabKey}',${rec.id})">수정</button>`:""}</td></tr>`).join("");

  p.innerHTML=`
  <div class="toolbar">
    <div class="toolbar-left"><span class="sec-title">${title}</span></div>
    <div class="toolbar-right">${adminEdit}${addBtn}</div>
  </div>
  ${filterHtml}
  ${boardHtml}
  <div class="tbl-wrap"><table><thead><tr>${thHtml}</tr></thead><tbody>${rows}</tbody></table></div>
  ${!filtered.length?`<div class="text-muted mt-12" style="text-align:center;padding:16px">조건에 맞는 항목이 없습니다</div>`:""}`;
}
window.setTabFilter=function(tabKey,filterKey,val){if(!tabFilters[tabKey])tabFilters[tabKey]={};tabFilters[tabKey][filterKey]=val;renderTab(tabKey);};

window.addRecord=function(tabKey){
  if(!editGuard())return;
  const schema=getSchema(tabKey);
  modal("추가",buildFormHtml(schema,null),()=>{

function ctBoard(filtered){
  const mems=ctMembers();const killerTotal=filtered.filter(x=>x.f_is_killer).length;const total=filtered.length;

window.openSchemaEditor=function(tabKey){
  if(!window._isAdmin){alert("관리자만 접근 가능합니다");return;}
  const schema=getSchema(tabKey);
  const SYSTEM_TYPES=["region_picker","product_picker","month_picker","week_picker","member_picker","inf_member_picker","ct_member_picker"];
  const typeLabels={text:"텍스트(단답)",memo:"텍스트(장문)",number:"숫자",date:"날짜",checkbox:"체크박스",link:"링크",dropdown:"드롭다운",...Object.fromEntries(SYSTEM_TYPES.map(t=>[t,`시스템(${t})`]))};

  function renderSchemaRows(){
    return schema.map((f,i)=>{
      const isSystem=SYSTEM_TYPES.includes(f.type);
      const moveUp=i>0?`<button class="btn btn-ghost btn-sm" onclick="schemaMove('${tabKey}',${i},-1)">↑</button>`:"";
      const moveDown=i<schema.length-1?`<button class="btn btn-ghost btn-sm" onclick="schemaMove('${tabKey}',${i},1)">↓</button>`:"";
      const editBtn=`<button class="btn btn-ghost btn-sm" onclick="schemaEditField('${tabKey}',${i})">✏️</button>`;
      const delBtn=isSystem?"":` <button class="btn btn-sm" style="color:#ef4444;border-color:#fecaca" onclick="schemaDelField('${tabKey}',${i})">삭제</button>`;
      return `<div class="schema-field-row">
        <span style="font-size:12px;font-weight:700;flex:1">${esc(f.label)}</span>
        <span class="text-muted">${typeLabels[f.type]||f.type}</span>
        ${isSystem?`<span class="tag s-todo" style="font-size:9px">시스템</span>`:""}
        ${moveUp}${moveDown}${editBtn}${delBtn}
      </div>`;
    }).join("");
  }

  function showEditor(){
    document.getElementById("modal-title").textContent=`필드 관리 — ${tabKey}`;
    document.getElementById("modal-body").innerHTML=`
      <div id="schema-rows">${renderSchemaRows()}</div>
      <button class="btn-add mt-8" onclick="schemaAddField('${tabKey}')">+ 필드 추가</button>`;
    document.getElementById("modal-footer").innerHTML=`<button class="m-cancel" onclick="closeModal()">닫기</button><button class="m-save" onclick="schemaSave('${tabKey}')">저장 후 적용</button>`;
  }
  document.getElementById("modal-overlay").classList.add("open");
  showEditor();
  window._currentSchemaTabKey=tabKey;
  window._schemaRefresh=showEditor;
};

window.editProdsRegion=function(r){
  const cur=(r==="tw"?prodsTW():prodsHK()).join("\n");
  modal(`${r==="tw"?"🇹🇼 대만":"🇭🇰 홍콩"} 제품 수정`,`<label>제품 목록 (한 줄에 하나씩)</label><textarea id="rpl" rows="8">${esc(cur)}</textarea><div class="text-muted mt-8">삭제하면 성과 탭에서 즉시 반영</div>`,()=>{
    const list=gv("rpl").split("\n").map(x=>x.trim()).filter(Boolean);
    if(r==="tw")S.productsTW=list;else S.productsHK=list;
    S.products=[...new Set([...arr(S.productsTW),...arr(S.productsHK)])];
    S.products.forEach(pr=>{if(!S.sales?.[pr]){if(!S.sales)S.sales={};S.sales[pr]={tw:{targetRevenue:0,actualRevenue:0,targetCM:0,actualCM:0,updatedAt:""},hk:{targetRevenue:0,actualRevenue:0,targetCM:0,actualCM:0,updatedAt:""}};}if(!S.strategy?.[pr]){if(!S.strategy)S.strategy={};S.strategy[pr]={};}});
    save(`${r.toUpperCase()} 제품목록수정`);renderSettings();if(isActive("sales"))renderSales();closeModal();
  });
};

window.hideProduct=function(prod){
  if(!S.hiddenProducts)S.hiddenProducts=[];
  S.hiddenProducts=arr(S.hiddenProducts);
  if(!S.hiddenProducts.includes(prod))S.hiddenProducts.push(prod);
  save(`제품 숨김: ${prod}`);renderSettings();rerenderCurrent();
};
window.showProduct=function(prod){
  S.hiddenProducts=arr(S.hiddenProducts).filter(p=>p!==prod);
  save(`제품 복원: ${prod}`);renderSettings();rerenderCurrent();
};

// ── CELL EXPAND/COLLAPSE ──
window.toggleCell=function(id){
  const el=document.getElementById(id);if(!el)return;
  const expanded=el.dataset.expanded==="1";
  if(expanded){
    el.style.whiteSpace="nowrap";el.style.overflow="hidden";el.style.maxWidth="160px";el.style.textOverflow="ellipsis";el.dataset.expanded="0";
  }else{
    el.style.whiteSpace="normal";el.style.overflow="visible";el.style.maxWidth="360px";el.style.textOverflow="unset";el.dataset.expanded="1";
  }
};

    document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
    btn.classList.add("active");const tab=btn.dataset.tab;
    document.getElementById("panel-"+tab).classList.add("active");renderTab(tab);
  });
});

// ── LOGIN ──────────────────────────────────────────────
// Passwords: admin=yeseul2025, default user=partjang2025
function doLogin(pw){
  if(pw==="yeseul2025"){
    window._currentUser="예슬(관리자)";window._isAdmin=true;
    document.getElementById("login-screen").style.display="none";
    document.getElementById("app").style.display="block";
    document.getElementById("sync-bar").style.display="flex";
    save("로그인");setTimeout(autoSnapshotIfNeeded,3000);
    renderHeader();renderSales();
    return;
  }
  const users=arr(S.settings?.users||[]);
  const user=users.find(u=>u.pw===pw);
  if(user){
    window._currentUser=user.name;window._isAdmin=!!user.isAdmin;
    document.getElementById("login-screen").style.display="none";
    document.getElementById("app").style.display="block";
    document.getElementById("sync-bar").style.display="flex";
    save("로그인");setTimeout(autoSnapshotIfNeeded,3000);
    renderHeader();renderSales();
  } else {
    document.getElementById("login-error").style.display="block";
    document.getElementById("pw-input").value="";
    document.getElementById("pw-input").focus();
  }
}

document.getElementById("login-btn").addEventListener("click",function(){
  doLogin(document.getElementById("pw-input").value);
});
document.getElementById("pw-input").addEventListener("keydown",function(e){
  if(e.key==="Enter") doLogin(this.value);
});

window.logout=function(){
  window._currentUser=null;window._isAdmin=false;window._isViewer=false;
  document.getElementById("login-screen").style.display="flex";
  document.getElementById("app").style.display="none";
  document.getElementById("sync-bar").style.display="none";
  document.getElementById("pw-input").value="";
  document.getElementById("login-error").style.display="none";
};
window.openHistory=function(){document.getElementById("hist-overlay").classList.add("open");window._renderHistory();};
window.closeHistory=function(){document.getElementById("hist-overlay").classList.remove("open");};
